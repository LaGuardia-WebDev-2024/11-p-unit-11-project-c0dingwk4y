<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="Food1-button">Food #1</button>
    <button id="Food2-button">Food #2</button>
    <button id="Food3-button">Food #3</button>
    <h1>My Top 3 foods <span></span></h1>
    <ol>
      <li>
      <h3 id="Food1">Food #1</h3>
        <p class="Food1">Chicken or Goat Roti</p>
        <img class="Food1" src="https://tarasmulticulturaltable.com/wp-content/uploads/2017/02/Bajan-Chicken-and-Potato-Roti-4-of-5-500x500.jpg" alt="Chicken Roti">
    <li>
       <h3 id="Food2">Food #2</h3>
        <p class="Food2">Poul ak sos, (chicken in sauce)</p>
        <img class="Food2" src="https://cdn-afoem.nitrocdn.com/SxPKWZFChyxEHCGJaDmjvKYFpecLlykT/assets/images/optimized/rev-1e5167a/www.savorythoughts.com/wp-content/uploads/2023/05/Poulet-En-Sauce-Haitian-Chicken-Stew-SAVORY-THOUGHTS-2.jpg">
    </li>

      <li>
        <h3 id="Food3">Food #3</h3>
        <p class="Food3">Oxtail</p>
          <img class="Food3" src="https://grandbaby-cakes.com/wp-content/uploads/2022/05/Jamaican-Oxtail-rc.jpg">
      </li>
      

  
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
   
  <script>

$(".Food1").hide()

      // ======================== Button #1
      $("#Food1-button").click(function () {
        $("#Food1").css("color", "purple");
        $(".Food1").show(2000)
      });

$(".Food2").hide()

      // ======================== Button #2
      $("#Food2-button").click(function () {
        $("#Food2").css("color", "blue");
         $(".Food2").show(2000)
      });
  $(".Food3").hide()
  
      // ======================== Button #3
      $("#Food3-button").click(function () {
        $("#Food3").css("color", "green");
        $(".Food3").show(2000)
      });
  $("h1").html("<u>My Top 3 Foods</u>");
      // $("p").html( "Chicken or Goat Roti");
      // $("p").html("Poul ak sos (chicken with sauce"));
     

    </script>
  </body>
</html>
